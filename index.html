<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>智慧生活AI助手</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Noto Sans TC', sans-serif;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:
    linear-gradient(135deg,#dbeafe,#eff6ff,#ffffff);
}

/* 背景光暈 */

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#60a5fa;
    border-radius:50%;
    filter:blur(150px);
    top:-150px;
    left:-100px;
    opacity:0.35;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#a78bfa;
    border-radius:50%;
    filter:blur(150px);
    bottom:-200px;
    right:-100px;
    opacity:0.35;
}

/* 主容器 */

.container{
    position:relative;
    z-index:1;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* 導覽列 */

.navbar{
    width:100%;
    height:85px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.65);
    border-bottom:1px solid rgba(255,255,255,0.4);

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 50px;
}

.logo{
    font-size:30px;
    font-weight:700;
    color:#2563eb;
}

.nav-links{
    display:flex;
    gap:40px;
}

.nav-links a{
    text-decoration:none;
    color:#1e293b;
    font-size:18px;
    font-weight:500;
    transition:0.3s;
    position:relative;
}

.nav-links a:hover{
    color:#2563eb;
}

.nav-links a::after{
    content:"";
    position:absolute;
    width:0%;
    height:3px;
    background:#2563eb;
    left:0;
    bottom:-8px;
    border-radius:10px;
    transition:0.3s;
}

.nav-links a:hover::after{
    width:100%;
}

/* 主畫面 */

.main{
    flex:1;
    display:flex;
    overflow:hidden;
}

/* 側邊欄 */

.sidebar{
    width:290px;
    padding:30px 20px;

    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.45);

    border-right:1px solid rgba(255,255,255,0.4);
}

.sidebar-title{
    font-size:24px;
    font-weight:700;
    margin-bottom:25px;
    color:#1e293b;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.menu button{
    padding:18px;
    border:none;
    border-radius:18px;
    background:rgba(255,255,255,0.75);

    font-size:17px;
    font-weight:500;

    cursor:pointer;
    transition:0.35s;

    box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.menu button:hover{
    transform:translateY(-5px) scale(1.03);
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    box-shadow:0 15px 30px rgba(37,99,235,0.3);
}

/* 中間內容 */

.content{
    flex:1;
    padding:40px;
    overflow:auto;
}

/* 卡片共用 */

.card{
    background:rgba(255,255,255,0.72);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.5);

    border-radius:30px;

    box-shadow:
    0 10px 40px rgba(0,0,0,0.08);

    margin-bottom:30px;
}

/* 歡迎區 */

.welcome{
    padding:40px;
}

.welcome h1{
    font-size:42px;
    margin-bottom:15px;
    color:#0f172a;
}

.welcome p{
    font-size:18px;
    color:#475569;
    line-height:1.8;
}

/* 輸入區 */

.input-area{
    padding:35px;
}

textarea{
    width:100%;
    height:170px;

    border:none;
    outline:none;

    padding:25px;

    border-radius:25px;

    background:#f8fafc;

    font-size:18px;

    resize:none;

    box-shadow:inset 0 2px 8px rgba(0,0,0,0.05);
}

.action-bar{
    margin-top:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.tools{
    display:flex;
    gap:15px;
}

.tool-btn{
    padding:12px 20px;
    border:none;
    border-radius:14px;

    background:#eef2ff;

    cursor:pointer;
    transition:0.3s;
}

.tool-btn:hover{
    background:#dbeafe;
}

/* 生成按鈕 */

.generate-btn{
    border:none;

    padding:16px 40px;

    border-radius:18px;

    font-size:20px;
    font-weight:700;

    color:white;

    background:
    linear-gradient(135deg,#22c55e,#16a34a);

    cursor:pointer;

    transition:0.35s;

    box-shadow:
    0 10px 25px rgba(34,197,94,0.3);
}

.generate-btn:hover{
    transform:translateY(-4px) scale(1.04);

    box-shadow:
    0 20px 35px rgba(34,197,94,0.4);
}

/* 結果區 */

.result-card{
    padding:35px;
}

.result-title{
    font-size:28px;
    font-weight:700;
    margin-bottom:25px;
    color:#111827;
}

.result-box{
    background:#f8fafc;

    padding:30px;

    border-radius:24px;

    line-height:2;

    color:#334155;

    font-size:17px;
}

/* 頁尾 */

.footer{
    height:70px;

    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.55);

    display:flex;
    justify-content:center;
    align-items:center;

    color:#475569;

    font-size:15px;
}

/* 滾動條 */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{
    background:#cbd5e1;
    border-radius:20px;
}

/* 手機版 */

@media(max-width:900px){

    body{
        overflow:auto;
    }

    .main{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
    }

    .navbar{
        padding:0 20px;
    }

    .nav-links{
        display:none;
    }

    .content{
        padding:20px;
    }

    .welcome h1{
        font-size:30px;
    }

    .action-bar{
        flex-direction:column;
        gap:20px;
    }

    .generate-btn{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- 導覽列 -->

    <div class="navbar">

        <div class="logo">
            🤖 智慧生活AI助手
        </div>

        <div class="nav-links">
            <a href="#">首頁</a>
            <a href="#">功能</a>
            <a href="#">歷史紀錄</a>
            <a href="#">設定</a>
        </div>

    </div>

    <!-- 主畫面 -->

    <div class="main">

        <!-- 側邊欄 -->

        <div class="sidebar">

            <div class="sidebar-title">
                ⚡ 快速功能
            </div>

            <div class="menu">

                <button>📅 行程規劃</button>

                <button>📝 筆記整理</button>

                <button>📚 學習助手</button>

                <button>🔍 資料查詢</button>

                <button>💡 AI建議</button>

            </div>

        </div>

        <!-- 內容 -->

        <div class="content">

            <!-- 歡迎區 -->

            <div class="card welcome">

                <h1>
                    您好！我是您的智慧AI助手 👋
                </h1>

                <p>
                    我可以幫助您整理資訊、規劃行程、
                    提供建議與提升學習效率，
                    讓您的生活更加方便與智慧化。
                </p>

            </div>

            <!-- 輸入區 -->

            <div class="card input-area">

                <textarea placeholder="請輸入您的問題或需求..."></textarea>

                <div class="action-bar">

                    <div class="tools">

                        <button class="tool-btn">
                            📎 上傳檔案
                        </button>

                        <button class="tool-btn">
                            💬 範例問題
                        </button>

                    </div>

                    <button class="generate-btn">
                        ✨ 生成內容
                    </button>

                </div>

            </div>

            <!-- 結果區 -->

            <div class="card result-card">

                <div class="result-title">
                    📋 AI 回應結果
                </div>

                <div class="result-box">

                    • 幫您整理重點資訊<br>
                    • 提供最佳行程規劃<br>
                    • 自動生成學習建議<br>
                    • 快速提升工作效率

                </div>

            </div>

        </div>

    </div>

    <!-- 頁尾 -->

    <div class="footer">
        © 2026 智慧生活AI助手 | AI Smart Assistant
    </div>

</div>
<script>

// ===================== 基本元素 =====================
const textarea = document.querySelector("textarea");
const resultBox = document.querySelector(".result-box");
const generateBtn = document.querySelector(".generate-btn");
const menuBtns = document.querySelectorAll(".menu button");
const toolBtns = document.querySelectorAll(".tool-btn");
const navLinks = document.querySelectorAll(".nav-links a");

// ===================== 歷史紀錄 =====================
let history = [];

// ===================== AI 回覆核心 =====================
function generateAI(text){

    // HTML問題
    if(text.includes("html")){

        return `
<b>🌐 HTML學習建議</b><br><br>

HTML 是建立網頁的基礎語言，幾乎所有網站都會用到。<br><br>

<b>📌 你可以先學這些：</b><br>
1️⃣ h1 ~ h6：標題<br>
2️⃣ p：文字段落<br>
3️⃣ img：圖片<br>
4️⃣ a：連結<br>
5️⃣ div：區塊容器<br><br>

<b>💡 簡單範例：</b><br><br>

&lt;h1&gt;我的網站&lt;/h1&gt;<br>
&lt;p&gt;這是一段文字&lt;/p&gt;<br><br>

<b>📚 學習順序：</b><br>
HTML → CSS → JavaScript<br><br>

<b>🎯 建議：</b><br>
不要只看影片，要邊學邊做小作品，進步會快很多。
`;
    }

    // 程式問題
    if(text.includes("程式")){

        return `
<b>💻 程式學習建議</b><br><br>

學程式最重要的不是背語法，而是理解邏輯。<br><br>

<b>📌 推薦學習方式：</b><br>
1️⃣ 先學基礎語法<br>
2️⃣ 自己修改範例<br>
3️⃣ 練習小專案<br>
4️⃣ 遇到錯誤就查原因<br><br>

<b>💡 新手常見問題：</b><br>
✔ 一次學太多<br>
✔ 只看不實作<br>
✔ 害怕報錯<br><br>

其實報錯很正常，很多工程師每天都在修錯誤。<br><br>

<b>🎯 建議：</b><br>
每天練習 30 分鐘，比一次學 5 小時更有效。
`;
    }

    // 數學問題
    if(text.includes("數學")){

        return `
<b>📚 數學解題方法</b><br><br>

很多人覺得數學難，其實大部分問題都是因為「沒看懂題目」。<br><br>

<b>📌 解題步驟：</b><br>
1️⃣ 先找題目給的條件<br>
2️⃣ 確認題目在問什麼<br>
3️⃣ 找適合的公式<br>
4️⃣ 一步一步代入計算<br><br>

<b>💡 重點：</b><br>
不要急著算，先理解題目意思。<br><br>

<b>🎯 建議：</b><br>
做完題目後，可以回頭檢查一次計算過程。
`;
    }

    // AI問題
    if(text.includes("ai") || text.includes("AI")){

        return `
<b>🤖 AI介紹</b><br><br>

AI（人工智慧）是讓電腦模擬人類思考與學習的技術。<br><br>

<b>📌 AI可以做什麼？</b><br>
✔ 聊天問答<br>
✔ 圖片生成<br>
✔ 語音辨識<br>
✔ 自動翻譯<br>
✔ 資料分析<br><br>

<b>💡 常見AI工具：</b><br>
• ChatGPT：聊天與寫作<br>
• Midjourney：生成圖片<br>
• Gemini：搜尋與分析<br><br>

<b>🎯 建議：</b><br>
學AI時，可以從「怎麼使用AI工具」開始，再慢慢了解背後原理。
`;
    }

    // 通用回答
    return `
<b>🧠 AI 分析結果</b><br><br>

你輸入的內容是：<br>
「${text}」<br><br>

<b>📌 我的理解：</b><br>
這個問題和資訊整理、學習或解決方法有關。<br><br>

<b>💡 建議做法：</b><br>
1️⃣ 先確認目標<br>
2️⃣ 把問題拆小<br>
3️⃣ 一步一步完成<br>
4️⃣ 遇到問題再修正<br><br>

<b>🚀 進一步建議：</b><br>
如果你能提供更詳細的內容，例如：<br>
• 發生什麼問題<br>
• 哪一步卡住<br>
• 想達成什麼效果<br><br>

我就能提供更精準、更完整的解答。<br><br>

<b>🎯 結論：</b><br>
很多問題其實不是太難，而是一次想太多。<br>
把問題拆開後，通常就會容易很多。
`;
}

// ===================== 生成內容 =====================
generateBtn.onclick = () => {

    const text = textarea.value.trim();

    if(!text){
        resultBox.innerHTML = "⚠️ 請先輸入問題，我才能幫你分析。";
        return;
    }

    history.push(text);

    resultBox.innerHTML = generateAI(text);
};

// ===================== 側邊欄功能 =====================

// 行程規劃
menuBtns[0].onclick = () => {

    resultBox.innerHTML = `
<b>📅 行程規劃助手</b><br><br>

一個好的行程規劃，可以讓時間利用更有效率。<br><br>

<b>📌 建議安排方式：</b><br>
☀️ 早上：安排主要活動<br>
🍱 中午：休息與吃飯<br>
🌆 下午：自由活動或備用行程<br>
🌙 晚上：放鬆與整理今天內容<br><br>

<b>💡 小技巧：</b><br>
不要把時間排太滿，保留一些彈性會更輕鬆。
`;
};

// 筆記整理
menuBtns[1].onclick = () => {

    resultBox.innerHTML = `
<b>📝 筆記整理助手</b><br><br>

整理筆記最重要的是「看得懂」。<br><br>

<b>📌 建議方法：</b><br>
✔ 標題清楚<br>
✔ 重點條列<br>
✔ 使用關鍵字<br>
✔ 顏色分類重點<br><br>

<b>🎯 建議：</b><br>
不要整頁都寫滿字，簡潔反而更容易記住。
`;
};

// 學習助手
menuBtns[2].onclick = () => {

    resultBox.innerHTML = `
<b>📚 學習助手</b><br><br>

學習最重要的是持續，而不是一次學很多。<br><br>

<b>📌 高效率學習方式：</b><br>
1️⃣ 每天固定時間學習<br>
2️⃣ 學完立刻練習<br>
3️⃣ 用自己的話重新解釋<br>
4️⃣ 定期複習<br><br>

<b>💡 重點：</b><br>
真正的理解，比死背更重要。
`;
};

// 資料查詢
menuBtns[3].onclick = () => {

    resultBox.innerHTML = `
<b>🔍 資料查詢助手</b><br><br>

查資料時，不要只看第一個答案。<br><br>

<b>📌 建議方法：</b><br>
✔ 使用正確關鍵字<br>
✔ 多比較不同網站<br>
✔ 確認資訊來源可信度<br><br>

<b>🎯 建議：</b><br>
學會查資料，比直接得到答案更重要。
`;
};

// AI建議
menuBtns[4].onclick = () => {

    resultBox.innerHTML = `
<b>💡 AI 建議助手</b><br><br>

很多問題其實都可以透過拆解來解決。<br><br>

<b>📌 建議流程：</b><br>
1️⃣ 先確認問題核心<br>
2️⃣ 找出目前卡住的位置<br>
3️⃣ 從最簡單的部分開始<br>
4️⃣ 慢慢優化結果<br><br>

<b>🎯 核心觀念：</b><br>
一步一步完成，比一次做到完美更重要。
`;
};

// ===================== 導覽列功能 =====================

// 首頁
navLinks[0].onclick = (e) => {
    e.preventDefault();

    resultBox.innerHTML = `
<b>🏠 歡迎回到首頁</b><br><br>

你可以使用左側功能快速獲得幫助，<br>
也可以直接輸入問題讓 AI 幫你分析與回答。
`;
};

// 功能
navLinks[1].onclick = (e) => {
    e.preventDefault();

    resultBox.innerHTML = `
<b>⚙️ 系統功能總覽</b><br><br>

🤖 AI 智慧問答<br>
📅 行程規劃<br>
📝 筆記整理<br>
📚 學習助手<br>
🔍 資料查詢<br>
💡 AI 建議<br>
📜 歷史紀錄<br><br>

這些功能可以幫助你更有效率地整理資訊與學習。
`;
};

// 歷史紀錄
navLinks[2].onclick = (e) => {

    e.preventDefault();

    if(history.length === 0){
        resultBox.innerHTML = "📜 目前還沒有歷史紀錄";
        return;
    }

    let html = "<b>📜 歷史紀錄</b><br><br>";

    history.forEach((item,index)=>{
        html += `${index + 1}. ${item}<br><br>`;
    });

    resultBox.innerHTML = html;
};

// 設定
navLinks[3].onclick = (e) => {

    e.preventDefault();

    resultBox.innerHTML = `
<b>⚙️ 系統設定</b><br><br>

✔ AI 系統正常運作<br>
✔ 歷史紀錄已啟用<br>
✔ 智慧分析模式已開啟<br><br>

目前系統運行穩定。
`;
};

// ===================== 工具按鈕 =====================

// 上傳檔案
toolBtns[0].onclick = () => {

    resultBox.innerHTML = `
<b>📎 上傳檔案功能</b><br><br>

目前這個功能是展示版本。<br><br>

未來可以支援：<br>
✔ 上傳圖片<br>
✔ 上傳 PDF<br>
✔ 上傳 Word 文件<br>
✔ AI 自動分析內容
`;
};

// 範例問題
toolBtns[1].onclick = () => {

    textarea.value = "怎麼有效學習HTML？";

    resultBox.innerHTML = `
<b>💬 已填入範例問題</b><br><br>

目前輸入框已自動填入：<br>
「怎麼有效學習HTML？」<br><br>

你現在可以點擊「✨生成內容」查看 AI 回答。
`;
};

</script>
</html>
