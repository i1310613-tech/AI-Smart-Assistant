<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>智慧生活AI助手</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Noto Sans TC', sans-serif;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:
    linear-gradient(135deg,#dbeafe,#eff6ff,#ffffff);
}

/* 背景光暈 */

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#60a5fa;
    border-radius:50%;
    filter:blur(150px);
    top:-150px;
    left:-100px;
    opacity:0.35;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#a78bfa;
    border-radius:50%;
    filter:blur(150px);
    bottom:-200px;
    right:-100px;
    opacity:0.35;
}

/* 主容器 */

.container{
    position:relative;
    z-index:1;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* 導覽列 */

.navbar{
    width:100%;
    height:85px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.65);
    border-bottom:1px solid rgba(255,255,255,0.4);

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 50px;
}

.logo{
    font-size:30px;
    font-weight:700;
    color:#2563eb;
}

.nav-links{
    display:flex;
    gap:40px;
}

.nav-links a{
    text-decoration:none;
    color:#1e293b;
    font-size:18px;
    font-weight:500;
    transition:0.3s;
    position:relative;
}

.nav-links a:hover{
    color:#2563eb;
}

.nav-links a::after{
    content:"";
    position:absolute;
    width:0%;
    height:3px;
    background:#2563eb;
    left:0;
    bottom:-8px;
    border-radius:10px;
    transition:0.3s;
}

.nav-links a:hover::after{
    width:100%;
}

/* 主畫面 */

.main{
    flex:1;
    display:flex;
    overflow:hidden;
}

/* 側邊欄 */

.sidebar{
    width:290px;
    padding:30px 20px;

    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.45);

    border-right:1px solid rgba(255,255,255,0.4);
}

.sidebar-title{
    font-size:24px;
    font-weight:700;
    margin-bottom:25px;
    color:#1e293b;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.menu button{
    padding:18px;
    border:none;
    border-radius:18px;
    background:rgba(255,255,255,0.75);

    font-size:17px;
    font-weight:500;

    cursor:pointer;
    transition:0.35s;

    box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.menu button:hover{
    transform:translateY(-5px) scale(1.03);
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    box-shadow:0 15px 30px rgba(37,99,235,0.3);
}

/* 中間內容 */

.content{
    flex:1;
    padding:40px;
    overflow:auto;
}

/* 卡片共用 */

.card{
    background:rgba(255,255,255,0.72);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.5);

    border-radius:30px;

    box-shadow:
    0 10px 40px rgba(0,0,0,0.08);

    margin-bottom:30px;
}

/* 歡迎區 */

.welcome{
    padding:40px;
}

.welcome h1{
    font-size:42px;
    margin-bottom:15px;
    color:#0f172a;
}

.welcome p{
    font-size:18px;
    color:#475569;
    line-height:1.8;
}

/* 輸入區 */

.input-area{
    padding:35px;
}

textarea{
    width:100%;
    height:170px;

    border:none;
    outline:none;

    padding:25px;

    border-radius:25px;

    background:#f8fafc;

    font-size:18px;

    resize:none;

    box-shadow:inset 0 2px 8px rgba(0,0,0,0.05);
}

.action-bar{
    margin-top:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.tools{
    display:flex;
    gap:15px;
}

.tool-btn{
    padding:12px 20px;
    border:none;
    border-radius:14px;

    background:#eef2ff;

    cursor:pointer;
    transition:0.3s;
}

.tool-btn:hover{
    background:#dbeafe;
}

/* 生成按鈕 */

.generate-btn{
    border:none;

    padding:16px 40px;

    border-radius:18px;

    font-size:20px;
    font-weight:700;

    color:white;

    background:
    linear-gradient(135deg,#22c55e,#16a34a);

    cursor:pointer;

    transition:0.35s;

    box-shadow:
    0 10px 25px rgba(34,197,94,0.3);
}

.generate-btn:hover{
    transform:translateY(-4px) scale(1.04);

    box-shadow:
    0 20px 35px rgba(34,197,94,0.4);
}

/* 結果區 */

.result-card{
    padding:35px;
}

.result-title{
    font-size:28px;
    font-weight:700;
    margin-bottom:25px;
    color:#111827;
}

.result-box{
    background:#f8fafc;

    padding:30px;

    border-radius:24px;

    line-height:2;

    color:#334155;

    font-size:17px;
}

/* 頁尾 */

.footer{
    height:70px;

    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.55);

    display:flex;
    justify-content:center;
    align-items:center;

    color:#475569;

    font-size:15px;
}

/* 滾動條 */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{
    background:#cbd5e1;
    border-radius:20px;
}

/* 手機版 */

@media(max-width:900px){

    body{
        overflow:auto;
    }

    .main{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
    }

    .navbar{
        padding:0 20px;
    }

    .nav-links{
        display:none;
    }

    .content{
        padding:20px;
    }

    .welcome h1{
        font-size:30px;
    }

    .action-bar{
        flex-direction:column;
        gap:20px;
    }

    .generate-btn{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- 導覽列 -->

    <div class="navbar">

        <div class="logo">
            🤖 智慧生活AI助手
        </div>

        <div class="nav-links">
            <a href="#">首頁</a>
            <a href="#">功能</a>
            <a href="#">歷史紀錄</a>
            <a href="#">設定</a>
        </div>

    </div>

    <!-- 主畫面 -->

    <div class="main">

        <!-- 側邊欄 -->

        <div class="sidebar">

            <div class="sidebar-title">
                ⚡ 快速功能
            </div>

            <div class="menu">

                <button>📅 行程規劃</button>

                <button>📝 筆記整理</button>

                <button>📚 學習助手</button>

                <button>🔍 資料查詢</button>

                <button>💡 AI建議</button>

            </div>

        </div>

        <!-- 內容 -->

        <div class="content">

            <!-- 歡迎區 -->

            <div class="card welcome">

                <h1>
                    您好！我是您的智慧AI助手 👋
                </h1>

                <p>
                    我可以幫助您整理資訊、規劃行程、
                    提供建議與提升學習效率，
                    讓您的生活更加方便與智慧化。
                </p>

            </div>

            <!-- 輸入區 -->

            <div class="card input-area">

                <textarea placeholder="請輸入您的問題或需求..."></textarea>

                <div class="action-bar">

                    <div class="tools">

                        <button class="tool-btn">
                            📎 上傳檔案
                        </button>

                        <button class="tool-btn">
                            💬 範例問題
                        </button>

                    </div>

                    <button class="generate-btn">
                        ✨ 生成內容
                    </button>

                </div>

            </div>

            <!-- 結果區 -->

            <div class="card result-card">

                <div class="result-title">
                    📋 AI 回應結果
                </div>

                <div class="result-box">

                    • 幫您整理重點資訊<br>
                    • 提供最佳行程規劃<br>
                    • 自動生成學習建議<br>
                    • 快速提升工作效率

                </div>

            </div>

        </div>

    </div>

    <!-- 頁尾 -->

    <div class="footer">
        © 2026 智慧生活AI助手 | AI Smart Assistant
    </div>

</div>
<script>

// ===================== AI 設定 =====================

let aiSettings = {
    tone: "普通",
    language: "繁體中文"
};

// 取得右上角「設定」
const settingBtn = document.querySelectorAll(".nav-links a")[3];

// ===================== 建立設定視窗 =====================

const settingPanel = document.createElement("div");

settingPanel.style.position = "fixed";
settingPanel.style.top = "0";
settingPanel.style.left = "0";
settingPanel.style.width = "100%";
settingPanel.style.height = "100%";
settingPanel.style.background = "rgba(0,0,0,0.45)";
settingPanel.style.display = "none";
settingPanel.style.justifyContent = "center";
settingPanel.style.alignItems = "center";
settingPanel.style.zIndex = "99999";

settingPanel.innerHTML = `

<div style="
    width:420px;
    background:white;
    border-radius:25px;
    padding:30px;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
">

    <h2 style="
        margin-bottom:25px;
        color:#111827;
    ">
        ⚙️ AI 設定
    </h2>

    <!-- 語氣 -->
    <div style="margin-bottom:25px;">

        <div style="
            font-size:16px;
            margin-bottom:10px;
            font-weight:700;
        ">
            🗣️ AI 說話語氣
        </div>

        <select id="toneSelect" style="
            width:100%;
            padding:12px;
            border-radius:12px;
            border:1px solid #d1d5db;
            font-size:15px;
        ">
            <option>普通</option>
            <option>專業</option>
            <option>輕鬆</option>
            <option>熱情</option>
            <option>簡短</option>
        </select>

    </div>

    <!-- 語言 -->
    <div style="margin-bottom:25px;">

        <div style="
            font-size:16px;
            margin-bottom:10px;
            font-weight:700;
        ">
            🌐 回覆語言
        </div>

        <select id="langSelect" style="
            width:100%;
            padding:12px;
            border-radius:12px;
            border:1px solid #d1d5db;
            font-size:15px;
        ">
            <option>繁體中文</option>
            <option>English</option>
            <option>日本語</option>
        </select>

    </div>

    <!-- 儲存 -->
    <button id="saveSetting" style="
        width:100%;
        padding:14px;
        border:none;
        border-radius:14px;
        background:linear-gradient(135deg,#2563eb,#7c3aed);
        color:white;
        font-size:16px;
        font-weight:700;
        cursor:pointer;
    ">
        💾 儲存設定
    </button>

</div>
`;

document.body.appendChild(settingPanel);

// ===================== 打開設定 =====================

settingBtn.addEventListener("click",(e)=>{

    e.preventDefault();

    settingPanel.style.display = "flex";
});

// ===================== 點背景關閉 =====================

settingPanel.addEventListener("click",(e)=>{

    if(e.target === settingPanel){
        settingPanel.style.display = "none";
    }
});

// ===================== 儲存設定 =====================

document.addEventListener("click",(e)=>{

    if(e.target.id === "saveSetting"){

        aiSettings.tone =
        document.getElementById("toneSelect").value;

        aiSettings.language =
        document.getElementById("langSelect").value;

        settingPanel.style.display = "none";

        document.querySelector(".result-box").innerHTML = `
        <b>⚙️ 設定已儲存</b><br><br>

        🗣️ AI語氣：
        ${aiSettings.tone}<br><br>

        🌐 回覆語言：
        ${aiSettings.language}<br><br>

        之後 AI 將依照你的設定進行回覆。
        `;
    }
});

// ===================== AI語氣系統 =====================

function applyTone(text){

    if(aiSettings.tone === "專業"){
        return `
<b>📘 專業分析</b><br><br>
${text}<br><br>
此問題建議透過系統化方式處理，
並逐步確認執行結果。
`;
    }

    if(aiSettings.tone === "輕鬆"){
        return `
😄 沒問題！<br><br>
${text}<br><br>
其實一步一步做就可以了，
不用太緊張～
`;
    }

    if(aiSettings.tone === "熱情"){
        return `
🔥 太好了！<br><br>
${text}<br><br>
你這個方向很棒！
繼續做下去一定會越來越強！
`;
    }

    if(aiSettings.tone === "簡短"){
        return `
${text}<br><br>
重點：一步一步完成即可。
`;
    }

    return text;
}

</script>
</html>
